version: 2
updates:
  # Python backend
  - package-ecosystem: "pip"
    directory: "/backend"
    target-branch: "staging"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "chore"
      include: "scope"
    cooldown:
      default-days: 3
      semver-major-days: 14
    groups:
      patch-updates:
        update-types: ["patch"]
      minor-updates:
        update-types: ["minor"]
      major-updates:
        update-types: ["major"]

  # Docker — Dockerfile.backend at repo root
  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "staging"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "chore"
      include: "scope"
    cooldown:
      default-days: 7
    groups:
      patch-updates:
        update-types: ["patch"]
      minor-updates:
        update-types: ["minor"]
      major-updates:
        update-types: ["major"]